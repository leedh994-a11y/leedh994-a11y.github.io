<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Install Sitp GPT — Embed code</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .install-wrap { max-width: 720px; margin: 0 auto; padding: 0 0 64px; }
    .code-box { background: #0f172a; color: #e2e8f0; padding: 16px; border-radius: 12px; font-size: 13px; overflow: auto; white-space: pre-wrap; word-break: break-all; }
    .verify-ok { color: #059669; font-weight: 600; }
    .verify-fail { color: #dc2626; font-weight: 600; }
    .step { margin: 24px 0; }
    .step h3 { margin-bottom: 8px; }
  </style>
<script>
var _hmt = _hmt || [];
(function() {
  var hm = document.createElement("script");
  hm.src = "https://hm.baidu.com/hm.js?09c617d7b704bf771069f0d8e48fde65";
  var s = document.getElementsByTagName("script")[0];
  s.parentNode.insertBefore(hm, s);
})();
</script>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo"><span class="logo-icon">◆</span> Sitp GPT</a>
      <nav class="nav-links">
        <a href="pricing.html">Pricing</a>
        <a href="https://yoursite.asia/account.html">Account</a>
      </nav>
    </div>
  </header>

  <main class="install-wrap container">
    <section class="hero" style="padding-bottom:24px">
      <span class="hero-badge">Installation</span>
      <h1>Embed Sitp GPT on your website</h1>
      <p class="hint">将 Sitp GPT 聊天组件嵌入任意网站，并验证安装是否成功。</p>
    </section>

    <div class="tool-panel">
      <div class="step">
        <h3>1. Copy embed code · 复制嵌入代码</h3>
        <p class="hint">Paste before <code>&lt;/body&gt;</code> on every page where you want the chat bubble.</p>
        <pre class="code-box" id="embed-code">Loading…</pre>
        <div class="btn-row" style="margin-top:12px">
          <button type="button" class="btn btn-primary" id="btn-copy">Copy code 复制</button>
        </div>
      </div>

      <div class="step">
        <h3>2. Verify installation · 验证安装</h3>
        <div class="form-group">
          <label for="verify-url">Website URL 网站地址</label>
          <input type="url" id="verify-url" placeholder="https://yoursite.asia">
        </div>
        <button type="button" class="btn btn-primary" id="btn-verify">Verify Sitp GPT 验证嵌入</button>
        <p id="verify-result" style="margin-top:12px"></p>
      </div>
    </div>
  </main>

  <script>
    const codeEl = document.getElementById("embed-code");
    const urlInput = document.getElementById("verify-url");
    const resultEl = document.getElementById("verify-result");

    async function loadEmbed() {
      const res = await fetch("/api/widget/embed");
      const data = await res.json();
      codeEl.textContent = data.embedCode || "";
      if (!urlInput.value) urlInput.value = location.origin;
    }

    document.getElementById("btn-copy").onclick = async () => {
      await navigator.clipboard.writeText(codeEl.textContent);
      alert("Copied! 已复制");
    };

    document.getElementById("btn-verify").onclick = async () => {
      resultEl.textContent = "Verifying… 验证中…";
      resultEl.className = "";
      try {
        const res = await fetch("/api/widget/verify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url: urlInput.value.trim() }),
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || "Verify failed");
        resultEl.className = data.verified ? "verify-ok" : "verify-fail";
        resultEl.innerHTML = `${data.verified ? "✓" : "✗"} ${data.message}<br>${data.messageZh || ""}<br><span class="hint">HTML scan: ${data.methods?.htmlScan ? "yes" : "no"} · Live ping: ${data.methods?.livePing ? "yes" : "no"}</span>`;
      } catch (e) {
        resultEl.className = "verify-fail";
        resultEl.textContent = e.message;
      }
    };

    loadEmbed();
  </script>
</body>
</html>
