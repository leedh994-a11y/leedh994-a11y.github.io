<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pricing — Pzhisen</title>
  <meta name="description" content="Pzhisen subscription plans — pay securely with PayPal.">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/pricing.css">
</head>
<body>
  <nav class="site-nav light" aria-label="Main">
    <a href="/">Pzhisen</a>
    <a href="/pricing.html" style="margin-right:16px">Pricing</a>
    <a href="/dashboard.html">Dashboard</a>
  </nav>

  <main class="pricing-page container">
    <section class="pricing-hero">
      <h1>Choose your AI team plan</h1>
      <p>Subscribe with PayPal — credit card or PayPal balance. Payments go directly to our merchant account.</p>
      <div class="billing-toggle" role="group" aria-label="Billing cycle">
        <button type="button" class="active" data-cycle="monthly">Monthly</button>
        <button type="button" data-cycle="yearly">Yearly <small>save 17%</small></button>
      </div>
    </section>

    <div class="pricing-grid" id="pricing-grid">
      <p style="grid-column:1/-1;text-align:center;color:var(--muted)">Loading plans…</p>
    </div>

    <section style="margin-top:48px;text-align:center">
      <h2 style="font-size:1.25rem">Payment</h2>
      <p class="checkout-hint" style="max-width:520px;margin:12px auto">
        PayPal — secure checkout for global customers
      </p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© 2026 Pzhisen · <a href="/">Home</a> · <a href="/pricing.html">Pricing</a></p>
    </div>
  </footer>

  <script src="js/pricing.js"></script>
</body>
</html>
