<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>定价 — Pzhisen</title>
  <meta name="description" content="Pzhisen 订阅方案 — 国内银行卡支付，海外 PayPal。">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/pricing.css">
</head>
<body>
  <nav class="site-nav light" aria-label="Main">
    <a href="/">Pzhisen</a>
    <a href="/pricing.html" style="margin-right:16px">定价</a>
    <a href="/dashboard.html">Dashboard</a>
  </nav>

  <main class="pricing-page container">
    <section class="pricing-hero">
      <h1>选择你的 AI 团队方案</h1>
      <p>国内用户使用银行卡支付（全国所有银行）；海外用户使用 PayPal。款项直达您的收款账户。</p>
      <div class="billing-toggle" role="group" aria-label="Billing cycle">
        <button type="button" class="active" data-cycle="monthly">月付</button>
        <button type="button" data-cycle="yearly">年付 <small>省 17%</small></button>
      </div>
    </section>

    <div class="pricing-grid" id="pricing-grid">
      <p style="grid-column:1/-1;text-align:center;color:var(--muted)">加载方案中…</p>
    </div>

    <section style="margin-top:48px;text-align:center">
      <h2 style="font-size:1.25rem">支付方式</h2>
      <p class="checkout-hint" style="max-width:560px;margin:12px auto">
        🏦 <strong>国内银行卡</strong>：工行、建行、农行、中行、招商、交通、浦发、民生等全国银行<br>
        款项结算至您绑定的 <strong>国内银行卡</strong><br>
        🌍 <strong>PayPal</strong>：海外用户
      </p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© 2026 Pzhisen · <a href="/">首页</a> · <a href="/pricing.html">定价</a></p>
    </div>
  </footer>

  <script src="js/pricing.js"></script>
</body>
</html>
