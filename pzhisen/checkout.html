<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — Pzhisen</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/pricing.css">
</head>
<body>
  <nav class="site-nav light" aria-label="Main">
    <a href="/">Pzhisen</a>
    <a href="/pricing.html" style="margin-right:16px">Pricing</a>
  </nav>

  <main class="checkout-page">
    <div class="checkout-card">
      <h1 id="checkout-title">Complete subscription</h1>
      <p id="checkout-subtitle" class="checkout-hint"></p>

      <div class="checkout-summary" id="summary">
        <div class="checkout-line"><span>Plan</span><strong id="sum-plan">—</strong></div>
        <div class="checkout-line"><span>Billing</span><strong id="sum-cycle">—</strong></div>
        <div class="checkout-line total"><span>Total</span><strong id="sum-total">—</strong></div>
      </div>

      <label style="display:block;font-size:14px;font-weight:500;margin-bottom:8px">
        Email (for your subscription)
        <input type="email" id="checkout-email" required placeholder="you@company.com"
          style="display:block;width:100%;height:44px;margin-top:8px;padding:0 16px;border:1px solid var(--border);border-radius:8px;font-size:16px;">
      </label>

      <p style="font-size:14px;font-weight:600;margin:24px 0 12px">Pay with PayPal</p>
      <button type="button" class="btn-primary" id="btn-pay" style="width:100%;margin-top:8px">Pay with PayPal</button>
      <div id="paypal-button-container"></div>
      <p class="checkout-hint" id="pay-hint"></p>
      <p class="checkout-error" id="checkout-error" hidden></p>
    </div>
  </main>

  <script src="js/checkout.js"></script>
</body>
</html>
