<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-VQ2VNH1FWY"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-VQ2VNH1FWY');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Pzhisen AI Team</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body class="dashboard-body">
  <header class="dashboard-nav">
    <a href="/" class="logo">Pzhisen</a>
    <div class="status-row" style="margin:0">
      <span class="status-pill" id="ai-status">Checking AI…</span>
      <a href="/pricing.html" class="btn-primary" style="height:40px;padding:0 16px;font-size:13px;background:transparent;color:var(--heading);border:1px solid var(--border)">订阅方案</a>
      <button type="button" id="btn-logout" class="btn-primary" style="height:40px;padding:0 16px;font-size:13px;background:transparent;color:var(--heading);border:1px solid var(--border)">退出</button>
      <a href="/" class="btn-primary" style="height:40px;padding:0 16px;font-size:13px">Home</a>
    </div>
  </header>

  <div class="dashboard-layout">
    <div id="paywall-banner" class="paywall-banner" hidden>
      <div>
        <strong>订阅专业版后即可使用全部功能</strong>
        <p>月付 ¥699 / $99，年付 ¥6999 / $999。中国内地可用银行卡转账，海外用户可用 PayPal。</p>
      </div>
      <a href="/checkout.html?plan=pro&cycle=monthly" class="btn-primary" id="paywall-cta">订阅专业版</a>
    </div>
    <aside class="sidebar">
      <h3>Your AI team</h3>
      <ul class="agent-list" id="agent-list"></ul>
      <button type="button" class="btn-primary" id="btn-run-daily" style="width:100%">Run daily standup</button>
      <p class="checkout-hint" style="margin-top:12px;font-size:12px">推广营销采用零成本有机渠道，无需充值广告投放费用。</p>
    </aside>

    <main class="main-panel">
      <section class="company-card" id="company-card">
        <h1 id="company-name">Loading…</h1>
        <p class="idea" id="company-idea"></p>
        <div class="btn-row">
          <button type="button" class="btn-primary" id="btn-run-all">Deploy all agents</button>
        </div>
      </section>

      <section class="log-terminal">
        <div class="log-terminal__bar"><span></span><span></span><span></span></div>
        <div class="log-terminal__body" id="log-body">
          <div class="log-line"><span class="time">--:--</span><span class="agent">[System]</span> Connecting to Pzhisen command center…</div>
        </div>
      </section>

      <section class="chat-panel">
        <h3 id="chat-title">全自动AI智能体对话</h3>
        <p class="chat-panel__hint checkout-hint">输入指令与 AI 智能体对话，系统将全自动分析并执行任务（仅支持文字，不支持上传图片）</p>
        <form class="chat-form" id="chat-form">
          <div class="chat-compose">
            <div class="chat-compose__row">
              <input type="text" id="chat-input" placeholder="输入指令，例如：本周应优先推进哪些工作？" autocomplete="off">
              <button type="submit" class="btn-primary">发送</button>
            </div>
          </div>
        </form>
        <div class="chat-response" id="chat-response"></div>
      </section>
    </main>
  </div>

  <script src="js/dashboard.js"></script>
</body>
</html>
