<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-VQ2VNH1FWY"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-VQ2VNH1FWY');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>收款管理 — Pzhisen</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/pricing.css">
</head>
<body>
  <main class="checkout-page">
    <div class="checkout-card">
      <h1>银行卡收款管理</h1>
      <p class="checkout-hint">用户点击「我已完成转账」后会自动开通订阅。此处处理未点击确认的订单（awaiting_transfer）。月付 ¥699，年付 ¥6999。</p>

      <label style="display:block;margin:16px 0">
        管理密钥 (BILLING_ADMIN_SECRET)
        <input type="password" id="admin-key" placeholder="输入 Render 中设置的密钥"
          style="display:block;width:100%;height:44px;margin-top:8px;padding:0 16px;border:1px solid var(--border);border-radius:8px;">
      </label>
      <button type="button" class="btn-primary" id="btn-load" style="width:100%">加载待确认订单</button>

      <hr style="margin:32px 0;border:none;border-top:1px solid var(--border)">
      <h2 style="margin:0 0 8px;font-size:1.1rem">恢复终身用户</h2>
      <p class="checkout-hint">为已购终身版用户恢复权限。邮箱 <code>ddb1520@outlook.com</code> 已在系统自动白名单中，登录后会自动开通。若用户忘记密码，可在此重置。</p>
      <label style="display:block;margin:12px 0">
        用户邮箱
        <input type="email" id="restore-email" value="ddb1520@outlook.com"
          style="display:block;width:100%;height:44px;margin-top:8px;padding:0 16px;border:1px solid var(--border);border-radius:8px;">
      </label>
      <label style="display:block;margin:12px 0">
        新密码（可选，仅当用户忘记原密码时填写，至少 8 位）
        <input type="password" id="restore-password" placeholder="留空则不修改密码"
          style="display:block;width:100%;height:44px;margin-top:8px;padding:0 16px;border:1px solid var(--border);border-radius:8px;">
      </label>
      <button type="button" class="btn-primary" id="btn-restore" style="width:100%">恢复终身权限</button>
      <p class="checkout-hint" id="restore-result" hidden style="margin-top:12px"></p>

      <div id="orders-list" style="margin-top:24px"></div>
      <p class="checkout-error" id="admin-error" hidden></p>
    </div>
  </main>
  <script>
    const keyInput = document.getElementById("admin-key");
    const saved = sessionStorage.getItem("pzhisen_admin_key");
    if (saved) keyInput.value = saved;

    async function loadOrders() {
      const key = keyInput.value.trim();
      if (!key) return alert("请输入管理密钥");
      sessionStorage.setItem("pzhisen_admin_key", key);
      const res = await fetch(`/api/billing/admin/pending?key=${encodeURIComponent(key)}`);
      const data = await res.json();
      const el = document.getElementById("admin-error");
      const list = document.getElementById("orders-list");
      if (!data.success) {
        el.hidden = false;
        el.textContent = data.error || "加载失败";
        list.innerHTML = "";
        return;
      }
      el.hidden = true;
      if (!data.orders.length) {
        list.innerHTML = "<p class='checkout-hint'>暂无待确认订单</p>";
        return;
      }
      list.innerHTML = data.orders.map((o) => `
        <div class="checkout-summary" style="margin-bottom:12px;text-align:left">
          <div class="checkout-line"><span>订单</span><strong>${o.id}</strong></div>
          <div class="checkout-line"><span>邮箱</span><strong>${o.email}</strong></div>
          <div class="checkout-line"><span>方案</span><strong>${o.planId} / ${o.cycle}</strong></div>
          <div class="checkout-line"><span>金额</span><strong>¥${o.amount}</strong></div>
          <div class="checkout-line"><span>备注码</span><strong>${o.transferCode || "—"}</strong></div>
          <div class="checkout-line"><span>状态</span><strong>${o.status}</strong></div>
          ${o.status === "awaiting_transfer" ? `<button type="button" class="btn-primary" style="width:100%;margin-top:12px" data-approve="${o.id}">手动确认收款并开通</button>` : ""}
        </div>
      `).join("");
      list.querySelectorAll("[data-approve]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const r = await fetch("/api/billing/admin/approve", {
            method: "POST",
            headers: { "Content-Type": "application/json", "X-Admin-Key": key },
            body: JSON.stringify({ orderId: btn.dataset.approve, key }),
          });
          const d = await r.json();
          if (d.success) { alert("已开通订阅"); loadOrders(); }
          else alert(d.error || "失败");
        });
      });
    }
    document.getElementById("btn-load").addEventListener("click", loadOrders);

    document.getElementById("btn-restore").addEventListener("click", async () => {
      const key = keyInput.value.trim();
      const email = document.getElementById("restore-email").value.trim();
      const newPassword = document.getElementById("restore-password").value;
      const resultEl = document.getElementById("restore-result");
      if (!key) return alert("请输入管理密钥");
      if (!email) return alert("请输入邮箱");
      sessionStorage.setItem("pzhisen_admin_key", key);
      const r = await fetch("/api/auth/admin/restore-user", {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-Admin-Key": key },
        body: JSON.stringify({ email, newPassword: newPassword || undefined, key }),
      });
      const d = await r.json();
      resultEl.hidden = false;
      resultEl.textContent = d.success ? d.message : (d.error || "失败");
      resultEl.style.color = d.success ? "#16a34a" : "#dc2626";
    });
  </script>
</body>
</html>
