<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>支付成功 — Pzhisen</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/pricing.css">
</head>
<body>
  <main class="success-page container">
    <h1 id="status-title">处理中…</h1>
    <p id="status-msg">正在确认您的付款，请稍候。</p>
    <a href="/dashboard.html" class="btn-primary" id="btn-dash" style="display:inline-flex;margin-top:24px">进入 Dashboard</a>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    const orderId = params.get("order");
    const title = document.getElementById("status-title");
    const msg = document.getElementById("status-msg");
    const btnDash = document.getElementById("btn-dash");

    function dashboardUrl(data) {
      if (data.dashboardUrl) return data.dashboardUrl;
      const companyId = data.companyId || localStorage.getItem("pzhisen_company_id");
      return companyId ? `/dashboard.html?company=${companyId}` : "/dashboard.html";
    }

    function onActivated(data) {
      const email = data.order?.email || data.subscription?.email;
      if (email) localStorage.setItem("pzhisen_email", email);
      if (data.companyId) localStorage.setItem("pzhisen_company_id", data.companyId);

      title.textContent = "支付成功！";
      const exp = data.subscription?.expiresAt || data.expiresAt;
      const expLabel = exp
        ? new Date(exp).toLocaleDateString("zh-CN", { year: "numeric", month: "long", day: "numeric" })
        : "";
      msg.textContent = expLabel
        ? `您的专业版订阅已激活，有效期至 ${expLabel}。正在跳转到 Dashboard…`
        : "您的专业版订阅已激活，正在跳转到 Dashboard…";
      const url = dashboardUrl(data);
      btnDash.href = url;
      btnDash.textContent = "立即使用全部功能";
      setTimeout(() => { location.href = url; }, 2000);
    }

    async function check() {
      if (!orderId) {
        title.textContent = "订单未找到";
        msg.textContent = "请返回定价页重新下单。";
        return;
      }
      try {
        const res = await fetch(`/api/billing/order/${orderId}`);
        const data = await res.json();
        if (data.active || data.order?.status === "completed") {
          onActivated(data);
          return;
        }
        if (data.order?.status === "pending" || data.order?.status === "paid") {
          title.textContent = "等待付款确认";
          msg.textContent = "如已完成支付，请稍等几秒…";
          setTimeout(check, 1500);
          return;
        }
        title.textContent = "付款未完成";
        msg.textContent = "请返回结账页重试。";
      } catch (e) {
        title.textContent = "确认失败";
        msg.textContent = e.message;
      }
    }
    check();
  </script>
</body>
</html>
