<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Serverless Devs 测试域名 - Powered By CNCF Sandbox Project Serverless Devs</title>
    <style>
        :root {
            font-family: Inter, system-ui, Avenir, Helvetica, Arial, sans-serif;
            line-height: 1.5;
            font-weight: 400;

            color: black;
            background-color: whitesmoke;

            font-synthesis: none;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            margin: 0;
            display: flex;
            place-items: center;
            min-width: 320px;
            min-height: 100vh;
        }

        .bouncing-blob {
            width: 32vw;
            aspect-ratio: 1;
            border-radius: 50%;
            will-change: transform;
            position: absolute;
            z-index: 1;
            top: 0;
            left: 0;
            transform-origin: left top;
        }

        .bouncing-blob--blue {
            background: #4783c7;
        }

        .bouncing-blob--white {
            background: #ffffff;
            z-index: 2;
            width: 15vw;
        }

        .bouncing-blob--purple {
            background: #8c8ff1;
        }

        .bouncing-blob--pink {
            background: #e289cd50;
        }

        .bouncing-blobs-container {
            position: fixed;
            z-index: -1;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .bouncing-blobs-glass {
            position: absolute;
            z-index: 2;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backdrop-filter: blur(140px);
            -webkit-backdrop-filter: blur(140px);
            pointer-events: none;
        }

        .bouncing-blobs {
            position: absolute;
            z-index: 1;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .hero {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .hero h2 {
            font-size: 70px;
            max-width: 800px;
            line-height: 1;
            text-align: center;
            font-weight: bold;
            text-transform: capitalize;
            margin-bottom: 20px;
            color: #021123;
        }

        .hero p {
            font-size: 24px;
            max-width: 800px;
            color: #021123;
        }

        @media (max-width: 1200px) {
            .bouncing-blobs-glass {
                backdrop-filter: blur(120px);
                -webkit-backdrop-filter: blur(120px);
            }
        }

        @media (max-width: 500px) {
            .bouncing-blob {
                width: 60vw;
            }

            .bouncing-blob--white {
                width: 30vw;
            }

            .bouncing-blobs-glass {
                backdrop-filter: blur(90px);
                -webkit-backdrop-filter: blur(90px);
            }

            .hero h2 {
                font-size: 32px;
            }

            .hero p {
                font-size: 16px;
                padding: 0 20px;
            }
        }
    </style>
</head>
<body>
<!-- partial:index.partial.html -->
<div class="bouncing-blobs-container">
    <div class="bouncing-blobs-glass"></div>
    <div class="bouncing-blobs">
        <div class="bouncing-blob bouncing-blob--blue"></div>
        <div class="bouncing-blob bouncing-blob--blue"></div>
        <div class="bouncing-blob bouncing-blob--blue"></div>
        <div class="bouncing-blob bouncing-blob--white"></div>
        <div class="bouncing-blob bouncing-blob--purple"></div>
        <div class="bouncing-blob bouncing-blob--purple"></div>
        <div class="bouncing-blob bouncing-blob--pink"></div>
    </div>
</div>
<div class="hero">
    <h2>温馨提示</h2>
    <p><font size="3">当前域名是 CNCF SandBox 项目 Serverless Devs 社区提供，仅供学习和测试使用，不可用于生产使用。社区会对该域名不定期地拨测，并在下发
        1 天后进行回收，建议绑定自定义域名以获得更好的使用体验。 </font><br></p>
    <p><b>如果刚创建就看到了当前页面</b>：域名生效需要一段时间，一般情况下 1 分钟之内，最长不超过 10 分钟，如长时间不生效请提<a
            href="https://github.com/Serverless-Devs/Serverless-Devs/issues" target="_blank">Issue</a>，以便我们快速协助您解决问题；<br>
        <b>如果创建了很久看到当前页面</b>：极大概率是超过 1 天后，域名被释放；社区所提供的域名仅供测试使用，不可用于生产，且
        1 天后自动释放，强烈建议绑定自定义域名；
    </p>
</div>
<!-- partial -->
<script>
    const MIN_SPEED = 1.5
    const MAX_SPEED = 2.5

    function randomNumber(min, max) {
        return Math.random() * (max - min) + min
    }

    class Blob {
        constructor(el) {
            this.el = el
            const boundingRect = this.el.getBoundingClientRect()
            this.size = boundingRect.width
            this.initialX = randomNumber(0, window.innerWidth - this.size)
            this.initialY = randomNumber(0, window.innerHeight - this.size)
            this.el.style.top = `${this.initialY}px`
            this.el.style.left = `${this.initialX}px`
            this.vx =
                randomNumber(MIN_SPEED, MAX_SPEED) * (Math.random() > 0.5 ? 1 : -1)
            this.vy =
                randomNumber(MIN_SPEED, MAX_SPEED) * (Math.random() > 0.5 ? 1 : -1)
            this.x = this.initialX
            this.y = this.initialY
        }

        update() {
            this.x += this.vx
            this.y += this.vy
            if (this.x >= window.innerWidth - this.size) {
                this.x = window.innerWidth - this.size
                this.vx *= -1
            }
            if (this.y >= window.innerHeight - this.size) {
                this.y = window.innerHeight - this.size
                this.vy *= -1
            }
            if (this.x <= 0) {
                this.x = 0
                this.vx *= -1
            }
            if (this.y <= 0) {
                this.y = 0
                this.vy *= -1
            }
        }

        move() {
            this.el.style.transform = `translate(${this.x - this.initialX}px, ${
                this.y - this.initialY
            }px)`
        }
    }

    function initBlobs() {
        const blobEls = document.querySelectorAll('.bouncing-blob')
        const blobs = Array.from(blobEls).map((blobEl) => new Blob(blobEl))

        function update() {
            requestAnimationFrame(update)
            blobs.forEach((blob) => {
                blob.update()
                blob.move()
            })
        }

        requestAnimationFrame(update)
    }

    initBlobs()
</script>

</body>
</html>
